<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline';">
    <title>Power Rail Drafter</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha512-qZvrmS2ekKPF2mSznTQsxqPh58iIqZxeemTGOBOsdTjHllGQ//iIqZhtIeUNiT24G4kHk5DkKaqoXy/E/1gHQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e24; --workspace-bg: #2a2a35;
            --text-color: #f1f1f1; --accent: #ff6b6b; --border-color: #333;
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-color); color: var(--text-color); overflow: hidden; 
        }
        .app-layout { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        .header {
            padding: 15px 20px; background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { margin: 0; font-size: 1.2rem; }
        #live-distance { color: var(--accent); font-family: monospace; font-size: 1.1rem; font-weight: bold; }

        .workspace-area {
            flex-grow: 1; position: relative; margin: 15px; 
            background: var(--workspace-bg); border-radius: 8px;
            border: 1px solid var(--border-color); overflow: hidden;
        }
        svg#draftWorkspace { width: 100%; height: 100%; touch-action: none; cursor: grab; display: block; }
        svg#draftWorkspace:active { cursor: grabbing; }

        .camera-controls {
            position: absolute; bottom: 20px; right: 20px;
            display: flex; gap: 8px; background: rgba(30, 30, 36, 0.85);
            padding: 8px; border-radius: 8px; backdrop-filter: blur(4px);
            border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .cam-btn {
            background: #444; color: white; border: none; border-radius: 4px;
            width: 36px; height: 36px; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .cam-btn:hover { background: var(--accent); }

        .controls-area {
            padding: 20px; background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            max-height: 45vh; overflow-y: auto;
        }
        .config-section { border-left: 3px solid #555; padding-left: 12px; margin-bottom: 20px; }
        .config-section h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }
        .input-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px; margin-bottom: 15px;
        }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; margin-bottom: 6px; color: #aaa; }
        input, select, textarea {
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #555;
            background: var(--bg-color); color: white; font-family: monospace; box-sizing: border-box;
        }
        select { appearance: none; cursor: pointer; }
        .action-row { display: flex; gap: 15px; margin-top: 10px; }
        button.primary-btn {
            background: var(--accent); color: white; border: none;
            padding: 15px; flex-grow: 1; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-size: 1rem; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="app-layout">
    <header class="header">
        <h1>Dual-Bus Drafter (Letter Scale)</h1>
        <span id="live-distance">9998 mm</span>
    </header>

    <div class="workspace-area">
        <svg id="draftWorkspace" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="camera-controls">
            <button class="cam-btn" id="btn-zoom-out" title="Zoom Out">−</button>
            <button class="cam-btn" id="btn-recenter" title="Recenter View">⌖</button>
            <button class="cam-btn" id="btn-zoom-in" title="Zoom In">+</button>
        </div>
    </div>

    <div class="controls-area">
        <div class="config-section" style="border-color: #bdc3c7;">
            <h3>Rail Geometry</h3>
            <div class="input-grid">
                <div class="input-group">
                    <label for="railLength">Total Length (mm)</label>
                    <input type="number" id="railLength" max="9998" min="0" value="9998" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label for="holeCount">Custom Holes (Per Rail)</label>
                    <input type="number" id="holeCount" max="40" min="0" value="0" inputmode="numeric">
                </div>
            </div>
        </div>

        <div class="config-section" style="border-color: #f39c12;">
            <h3>5-Lug Splice Connectors</h3>
            <div class="input-grid">
                <div class="input-group">
                    <label for="posOffset">Positive (Top) Offset (mm)</label>
                    <input type="number" id="posOffset" placeholder="Blank for none" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label for="negOffset">Negative (Bottom) Offset (mm)</label>
                    <input type="number" id="negOffset" placeholder="Blank for none" inputmode="numeric">
                </div>
            </div>
        </div>

        <div class="config-section" style="border-color: #5d6d7e;">
            <h3>Structural Post Anchors</h3>
            <div class="input-grid">
                <div class="input-group">
                    <label for="postOffsetVal">Anchor Offset (mm)</label>
                    <input type="number" id="postOffsetVal" value="0" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label for="postOffsetRef">Offset Reference Tip</label>
                    <select id="postOffsetRef">
                        <option value="left">Left Tip (0mm Start)</option>
                        <option value="right">Right Tip (Rail End)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="input-group" style="margin-bottom: 15px;">
            <label for="specs">Engineering Notes</label>
            <textarea id="specs" rows="2" placeholder="Tolerances, hardware revs..."></textarea>
        </div>
        <div class="action-row">
            <button id="exportPdfBtn" class="primary-btn">Export Work Order (PDF)</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname.includes('.github.dev');
            if (isDev) {
                navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
            } else {
                navigator.serviceWorker.register('/sw.js').catch(err => console.error(err));
            }
        });
    }
</script>
</body>
</html>
