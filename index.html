<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline';">
    <title>Power Rail Drafter - WYSIWYG CAD</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha512-qZvrmS2ekKPF2mSznTQsxqPh58iIqZxeemTGOBOsdTjHllGQ//iIqZhtIeUNiT24G4kHk5DkKaqoXy/E/1gHQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e24; --workspace-bg: #1c1c22;
            --text-color: #f1f1f1; --accent: #ff6b6b; --border-color: #333;
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-color); color: var(--text-color); overflow: hidden; 
        }
        .app-layout { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }
        
        .header {
            padding: 15px 20px; background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .header h1 { margin: 0; font-size: 1.1rem; }
        
        .workspace-area { 
            flex-grow: 1; position: relative; background: var(--workspace-bg); 
            overflow: hidden; min-height: 200px;
        }
        svg#draftWorkspace { width: 100%; height: 100%; touch-action: none; cursor: grab; display: block; }
        
        .fab-config {
            position: absolute; bottom: 20px; right: 20px;
            background: var(--accent); color: white; border: none; border-radius: 50%;
            width: 56px; height: 56px; font-size: 1.5rem; cursor: pointer; z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .camera-controls {
            position: absolute; bottom: 28px; right: 90px;
            display: flex; gap: 8px; background: rgba(30, 30, 36, 0.85);
            padding: 8px; border-radius: 8px; border: 1px solid #444; z-index: 5;
        }
        .cam-btn { background: #444; color: white; border: none; width: 36px; height: 36px; cursor: pointer; border-radius: 4px; }

        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 99; }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }

        .config-drawer {
            position: fixed; background: var(--panel-bg); z-index: 100; display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @media (orientation: portrait) {
            .config-drawer { bottom: 0; left: 0; width: 100vw; height: 75vh; transform: translateY(100%); border-radius: 16px 16px 0 0; }
            .config-drawer.open { transform: translateY(0); }
            .drawer-pull-tab { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 50px; height: 20px; background: var(--panel-bg); border-radius: 8px 8px 0 0; border: 1px solid var(--border-color); border-bottom: none; }
        }
        @media (orientation: landscape) {
            .config-drawer { top: 0; right: 0; height: 100vh; width: 400px; transform: translateX(100%); }
            .config-drawer.open { transform: translateX(0); }
            .drawer-pull-tab { position: absolute; top: 50%; left: -20px; transform: translateY(-50%); width: 20px; height: 50px; background: var(--panel-bg); border-radius: 8px 0 0 8px; border: 1px solid var(--border-color); border-right: none; }
        }

        .drawer-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .drawer-body { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .config-section { border-left: 3px solid #555; padding-left: 12px; margin-bottom: 20px; }
        .config-section h3 { font-size: 0.75rem; color: #888; text-transform: uppercase; margin: 0 0 10px 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; background: #121212; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .primary-btn { background: var(--accent); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 4px; letter-spacing: 1px;}
    </style>
</head>
<body>

<div class="app-layout">
    <header class="header">
        <h1>Letter Canvas Drafter</h1>
        <div id="status" style="font-size: 0.8rem; color: #aaa;">Status: Live WYSIWYG</div>
    </header>

    <div class="workspace-area">
        <svg id="draftWorkspace" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="camera-controls">
            <button class="cam-btn" id="btn-zoom-out">−</button>
            <button class="cam-btn" id="btn-recenter">⌖</button>
            <button class="cam-btn" id="btn-zoom-in">+</button>
        </div>
        <button class="fab-config" id="openMenuBtn">⚙️</button>
    </div>
</div>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="config-drawer" id="configDrawer">
    <div class="drawer-pull-tab" id="pullTab"></div>
    <div class="drawer-header"><h2>Config Matrix</h2><button id="closeMenuBtn" style="background:none; border:none; color:white; cursor:pointer; font-size: 1.2rem;">✕</button></div>
    <div class="drawer-body">
        <div class="config-section" style="border-color: #e74c3c;">
            <h3>Positive Rail (Top)</h3>
            <div class="input-group"><label>Length (mm)</label><input type="number" id="posLength" value="9998"></div>
            <div class="input-group"><label>5-Lug Offset (mm)</label><input type="number" id="posOffset" placeholder="None"></div>
        </div>
        <div class="config-section" style="border-color: #3498db;">
            <h3>Negative Rail (Bottom)</h3>
            <div class="input-group"><label>Length (mm)</label><input type="number" id="negLength" value="9000"></div>
            <div class="input-group"><label>5-Lug Offset (mm)</label><input type="number" id="negOffset" placeholder="None"></div>
        </div>
        <div class="config-section" style="border-color: #5d6d7e;">
            <h3>Supports</h3>
            <div class="input-group"><label>Anchor Offset (mm)</label><input type="number" id="postOffsetVal" value="0"></div>
            <div class="input-group"><label>Reference</label><select id="postOffsetRef"><option value="left">Left Tip</option><option value="right">Right Tip</option></select></div>
        </div>
        <textarea id="specs" rows="3" placeholder="Notes..."></textarea>
    </div>
    <div class="drawer-footer" style="padding:20px;"><button id="exportPdfBtn" class="primary-btn">EXPORT SHEET TO PDF</button></div>
</div>

<script src="app.js"></script>
</body>
</html>
