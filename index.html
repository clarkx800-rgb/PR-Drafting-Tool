<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline';">
    <title>Power Rail Drafter</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha512-qZvrmS2ekKPF2mSznTQsxqPh58iIqZxeemTGOBOsdTjHllGQ//iIqZhtIeUNiT24G4kHk5DkKaqoXy/E/1gHQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e24; --workspace-bg: #2a2a35;
            --text-color: #f1f1f1; --accent: #ff6b6b; --border-color: #333;
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-color); color: var(--text-color); overflow: hidden; 
        }
        .app-layout { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: relative; }
        
        /* Top Header */
        .header {
            padding: 15px 20px; background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header h1 { margin: 0; font-size: 1.2rem; }
        #live-distance { color: var(--accent); font-family: monospace; font-size: 1.1rem; font-weight: bold; }
        
        button.menu-toggle {
            background: var(--accent); color: white; border: none; border-radius: 4px;
            padding: 8px 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;
            text-transform: uppercase; font-size: 0.9rem;
        }

        /* Maximized Workspace */
        .workspace-area {
            flex-grow: 1; position: relative; background: var(--workspace-bg); 
            overflow: hidden; width: 100%;
        }
        svg#draftWorkspace { width: 100%; height: 100%; touch-action: none; cursor: grab; display: block; }
        svg#draftWorkspace:active { cursor: grabbing; }

        .camera-controls {
            position: absolute; bottom: 20px; right: 20px;
            display: flex; gap: 8px; background: rgba(30, 30, 36, 0.85);
            padding: 8px; border-radius: 8px; backdrop-filter: blur(4px);
            border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 5;
        }
        .cam-btn {
            background: #444; color: white; border: none; border-radius: 4px;
            width: 36px; height: 36px; font-size: 1.2rem; cursor: pointer;
        }
        .cam-btn:hover { background: var(--accent); }

        /* --- OFF-CANVAS DRAWER ARCHITECTURE --- */
        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 99;
        }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }

        .config-drawer {
            position: fixed; top: 0; right: 0; height: 100vh; width: min(400px, 100vw);
            background: var(--panel-bg); box-shadow: -5px 0 25px rgba(0,0,0,0.8);
            transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; display: flex; flex-direction: column;
        }
        .config-drawer.open { transform: translateX(0); }

        .drawer-header {
            padding: 20px; border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; background: #1a1a20;
        }
        .drawer-header h2 { margin: 0; font-size: 1.2rem; color: white; }
        .close-btn { background: none; border: none; color: #aaa; font-size: 1.5rem; cursor: pointer; }
        .close-btn:hover { color: var(--accent); }

        .drawer-body { padding: 20px; overflow-y: auto; flex-grow: 1; }

        .config-section { border-left: 3px solid #555; padding-left: 12px; margin-bottom: 25px; }
        .config-section h3 { margin: 0 0 12px 0; font-size: 0.85rem; color: #ccc; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: #aaa; }
        input, select, textarea {
            width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #555;
            background: var(--bg-color); color: white; font-family: monospace; box-sizing: border-box;
        }
        
        .drawer-footer { padding: 20px; border-top: 1px solid var(--border-color); background: #1a1a20; }
        button.primary-btn {
            background: var(--accent); color: white; border: none; width: 100%;
            padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="app-layout">
    <header class="header">
        <div class="header-left">
            <h1>Dual-Bus Drafter</h1>
            <span id="live-distance">9998 mm</span>
        </div>
        <button class="menu-toggle" id="openMenuBtn">⚙️ Config</button>
    </header>

    <div class="workspace-area">
        <svg id="draftWorkspace" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="camera-controls">
            <button class="cam-btn" id="btn-zoom-out" title="Zoom Out">−</button>
            <button class="cam-btn" id="btn-recenter" title="Recenter View">⌖</button>
            <button class="cam-btn" id="btn-zoom-in" title="Zoom In">+</button>
        </div>
    </div>
</div>

<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="config-drawer" id="configDrawer">
    <div class="drawer-header">
        <h2>Draft Settings</h2>
        <button class="close-btn" id="closeMenuBtn">✕</button>
    </div>
    
    <div class="drawer-body">
        <div class="config-section" style="border-color: #bdc3c7;">
            <h3>Rail Geometry</h3>
            <div class="input-group">
                <label for="railLength">Total Length (mm)</label>
                <input type="number" id="railLength" max="9998" min="0" value="9998" inputmode="numeric">
            </div>
            <div class="input-group">
                <label for="holeCount">Custom Holes (Per Rail)</label>
                <input type="number" id="holeCount" max="40" min="0" value="0" inputmode="numeric">
            </div>
        </div>

        <div class="config-section" style="border-color: #f39c12;">
            <h3>5-Lug Splice Connectors</h3>
            <div class="input-group">
                <label for="posOffset">Positive (Top) Offset (mm)</label>
                <input type="number" id="posOffset" placeholder="Blank for none" inputmode="numeric">
            </div>
            <div class="input-group">
                <label for="negOffset">Negative (Bottom) Offset (mm)</label>
                <input type="number" id="negOffset" placeholder="Blank for none" inputmode="numeric">
            </div>
        </div>

        <div class="config-section" style="border-color: #5d6d7e;">
            <h3>Structural Post Anchors</h3>
            <div class="input-group">
                <label for="postOffsetVal">Anchor Offset (mm)</label>
                <input type="number" id="postOffsetVal" value="0" inputmode="numeric">
            </div>
            <div class="input-group">
                <label for="postOffsetRef">Offset Reference Tip</label>
                <select id="postOffsetRef">
                    <option value="left">Left Tip (0mm Start)</option>
                    <option value="right">Right Tip (Rail End)</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <label for="specs">Engineering Notes</label>
            <textarea id="specs" rows="3" placeholder="Tolerances, hardware revs..."></textarea>
        </div>
    </div>

    <div class="drawer-footer">
        <button id="exportPdfBtn" class="primary-btn">Export Work Order (PDF)</button>
    </div>
</div>

<script src="app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname.includes('.github.dev');
            if (isDev) {
                navigator.serviceWorker.getRegistrations().then(r => r.forEach(reg => reg.unregister()));
            } else {
                navigator.serviceWorker.register('/sw.js').catch(err => console.error(err));
            }
        });
    }
</script>
</body>
</html>
